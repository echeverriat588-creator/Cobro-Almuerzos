<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>La cuenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Firebase (compat). Si no carga, sube el número de versión en estas dos líneas (ej: 11.0.2). -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --paper:#FAF5EC; --card:#FFFCF6; --panel:#F3EADA; --ink:#211C14;
    --inkSoft:#897E6C; --line:#E4DAC7; --accent:#E0533A; --green:#2E9E6B;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--paper);color:var(--ink);
    font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  #root{min-height:100dvh}
  .wrap{max-width:560px;margin:0 auto;padding:26px 18px 120px}
  .center{display:flex;flex-direction:column;justify-content:center;min-height:80dvh}
  .head{margin-bottom:14px}
  .eyebrow{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--inkSoft);margin-bottom:6px}
  .h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:34px;
    line-height:1.04;margin:0}
  .lead{color:var(--inkSoft);line-height:1.5;font-size:15px;margin:12px 0 18px}
  .field{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:14px;
    padding:13px 14px;font:inherit;font-size:16px;color:var(--ink);margin-bottom:10px;outline:none}
  .field:focus{border-color:var(--accent)}
  .btn{width:100%;border:none;border-radius:14px;background:var(--ink);color:var(--paper);
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;
    padding:14px;cursor:pointer;margin-top:6px}
  .btn:disabled{opacity:.5}
  .btn.alt{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .linkbtn{background:none;border:none;color:var(--accent);font:inherit;font-size:14px;
    font-weight:600;cursor:pointer;padding:0;margin-bottom:14px}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--card);
    border:1.5px solid var(--line);border-radius:999px;padding:7px 13px 7px 7px;margin:0 8px 8px 0;
    font-weight:600;font-size:15px;cursor:pointer}
  .chip:active{transform:scale(.97)}
  .dot{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;
    color:#fff;font-family:'Space Mono',monospace;font-weight:700;flex:0 0 auto}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--card);border:1.5px solid var(--line);border-radius:16px;
    padding:10px 12px;margin-bottom:14px}
  .me{display:inline-flex;align-items:center;gap:9px;font-weight:600;font-size:15px}
  .switch{background:none;border:none;color:var(--inkSoft);font:inherit;font-size:13px;
    text-decoration:underline;cursor:pointer;padding:0 0 0 4px}
  .ghost{background:none;border:1.5px solid var(--line);border-radius:11px;
    padding:8px 12px;font:inherit;font-size:13px;font-weight:600;color:var(--ink);
    cursor:pointer;white-space:nowrap}
  .ghost.done{border-color:var(--green);color:var(--green)}
  .tabs{display:flex;gap:6px;background:var(--panel);border-radius:13px;padding:4px;margin-bottom:14px}
  .tab{flex:1;border:none;background:none;border-radius:10px;padding:9px;font:inherit;
    font-weight:600;font-size:14px;color:var(--inkSoft);cursor:pointer}
  .tab.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .hint{color:var(--inkSoft);font-size:13px;margin-bottom:10px}
  .item{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--card);border:1.5px solid var(--line);border-radius:13px;
    padding:12px 14px;margin-bottom:8px;cursor:pointer}
  .item.mine{border-color:var(--mc);box-shadow:inset 0 0 0 1px var(--mc)}
  .item.taken{cursor:default}
  .item.grupal{cursor:default;background:var(--panel)}
  .item:active{transform:scale(.995)}
  .item.grupal:active,.item.taken:active{transform:none}
  .item-name{font-weight:500;font-size:15px}
  .item-right{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .owners{display:flex;gap:3px}
  .price{font-family:'Space Mono',monospace;font-size:14px;color:var(--inkSoft)}
  .tear{height:0;border-top:1.5px dashed var(--line);margin:14px 0}
  .prow{margin-bottom:8px}
  .phead{display:flex;align-items:center;justify-content:space-between;
    font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px;margin-bottom:6px}
  .pitem{display:flex;justify-content:space-between;font-size:13px;color:var(--inkSoft);
    padding:2px 0}
  .pitem .sp{font-style:italic}
  .recon{background:var(--panel);border-radius:14px;padding:14px 16px;margin-top:8px}
  .recon .l{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;color:var(--inkSoft)}
  .recon .l.k{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:17px;
    color:var(--ink);border-top:1.5px solid var(--line);margin-top:6px;padding-top:10px}
  .footer{position:fixed;left:0;right:0;bottom:0;background:var(--card);
    border-top:1.5px solid var(--line)}
  .footer-in{max-width:560px;margin:0 auto;padding:12px 18px 18px;display:flex;
    flex-direction:column;gap:8px}
  .prog{height:7px;border-radius:99px;background:var(--panel);overflow:hidden}
  .prog>div{height:100%;background:var(--green);transition:width .3s}
  .fmeta{font-size:13px;color:var(--inkSoft);text-align:center}
  /* lista de almuerzos recientes */
  .recents{margin-top:26px;border-top:1.5px dashed var(--line);padding-top:18px}
  .recent{display:flex;align-items:center;gap:8px;background:var(--card);
    border:1.5px solid var(--line);border-radius:13px;margin-bottom:8px;overflow:hidden}
  .recent-main{flex:1;display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:12px 14px;text-decoration:none;color:var(--ink)}
  .recent-name{font-weight:600;font-size:15px}
  .recent-date{font-family:'Space Mono',monospace;font-size:12px;color:var(--inkSoft)}
  .recent-x{border:none;background:none;color:var(--inkSoft);font-size:22px;line-height:1;
    padding:0 14px;cursor:pointer;align-self:stretch}
  /* ítems */
  .itemwrap{margin-bottom:8px}
  /* distintivo de ítem grupal */
  .gbadge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--accent);
    border:1px solid var(--accent);border-radius:999px;padding:1px 6px;margin-left:6px;
    vertical-align:middle}
  .gsub{font-size:12px;color:var(--inkSoft);padding:5px 4px 0 6px}
  /* agregar participantes con + */
  .addrow{display:flex;gap:8px;margin-bottom:10px}
  .addrow .addfield{margin-bottom:0;flex:1}
  .addbtn{flex:0 0 auto;width:52px;border:none;border-radius:14px;background:var(--ink);
    color:var(--paper);font-size:26px;font-weight:700;line-height:1;cursor:pointer}
  .addbtn:active{transform:scale(.96)}
  .people-chips{display:flex;flex-wrap:wrap;margin-bottom:6px}
  .chip-x{border:none;background:none;color:var(--inkSoft);font-size:18px;line-height:1;
    cursor:pointer;padding:0 0 0 2px;margin-left:2px}
  .subnote{color:var(--inkSoft);font-size:12px;margin:-2px 0 12px}
</style>
</head>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

const dbf = window.dbf;
const ts = () => firebase.firestore.FieldValue.serverTimestamp();
const billRef = (id) => dbf.collection("bills").doc(id);

const PCOLORS = ["#E0533A","#2E9E6B","#3B7DD8","#C98A1E","#8B5CF6","#D6457E","#14A89B","#7A8B2E","#B5562E"];
const fmt = (n) => "$" + Math.round(n).toLocaleString("es-CL");
const initials = (name) => name.trim().split(/\s+/).map(w=>w[0]).join("").slice(0,2).toUpperCase();
const param = (k) => new URLSearchParams(location.search).get(k);
const norm = (s) => (s||"").trim().toLowerCase();

// Almuerzos recientes guardados en este navegador (para listarlos en la portada)
const RECENTS_KEY = "cuenta_recientes";
const getRecents = () => { try{ return JSON.parse(localStorage.getItem(RECENTS_KEY) || "[]"); }catch(e){ return []; } };
const addRecent = (r) => {
  const list = getRecents().filter(x=>x.id!==r.id);
  list.unshift(r);
  localStorage.setItem(RECENTS_KEY, JSON.stringify(list.slice(0,12)));
};
const removeRecent = (id) => {
  localStorage.setItem(RECENTS_KEY, JSON.stringify(getRecents().filter(x=>x.id!==id)));
};

function Dot({ p, size=22 }) {
  return <span className="dot" style={{ background:p.color, width:size, height:size, fontSize:size*0.43 }}>{initials(p.name)}</span>;
}

// ---------- Crear cuenta nueva ----------
function CreateBill() {
  const [name, setName] = useState("");
  const [itemsText, setItemsText] = useState("");
  const [people, setPeople] = useState([]);     // lista de nombres (chips)
  const [personName, setPersonName] = useState("");
  const [busy, setBusy] = useState(false);
  const [recents, setRecents] = useState(getRecents);

  // Formato por línea:
  //   "Nombre precio"                      -> personal (se reclama tocándolo en el link)
  //   "* Nombre precio"                    -> grupal: se reparte entre TODOS
  //   "* Nombre precio | Berni, Benja"     -> grupal: se reparte solo entre esos nombres
  const parseItems = (t) => t.split("\n").map(l=>l.trim()).filter(Boolean).map((l,i)=>{
    let grupal = false, splitNames = null;
    if(l.startsWith("*")){ grupal = true; l = l.slice(1).trim(); }
    if(grupal){
      const pipe = l.indexOf("|");
      if(pipe !== -1){
        splitNames = l.slice(pipe+1).split(",").map(s=>s.trim()).filter(Boolean);
        l = l.slice(0,pipe).trim();
      }
    }
    const m = l.match(/^(.*?)[\s\$]+([\d.,]+)\s*$/);
    if(!m) return null;
    const it = { name:m[1].trim(), price:parseInt(m[2].replace(/[.,]/g,""),10), position:i+1, grupal };
    if(splitNames && splitNames.length) it.splitNames = splitNames;
    return it;
  }).filter(Boolean);

  // agregar / quitar participantes
  const addPerson = () => {
    const n = personName.trim();
    if(!n) return;
    if(people.some(p=>p.toLowerCase()===n.toLowerCase())){ setPersonName(""); return; }
    setPeople([...people, n]);
    setPersonName("");
  };
  const removePerson = (i) => setPeople(people.filter((_,idx)=>idx!==i));

  const create = async () => {
    const its = parseItems(itemsText);
    if(!its.length){ alert("Agrega al menos un ítem (formato: Nombre  precio)"); return; }
    setBusy(true);
    try{
      const bRef = await dbf.collection("bills").add({ name:name||"Cuenta", tipPct:0.10, createdAt:ts() });
      const batch = dbf.batch();
      its.forEach(it=>{ batch.set(bRef.collection("items").doc(), it); });
      people.forEach((n,i)=>{ batch.set(bRef.collection("participants").doc(), { name:n, color:PCOLORS[i%PCOLORS.length], pos:i }); });
      await batch.commit();
      addRecent({ id:bRef.id, name:name||"Almuerzo", createdAt:Date.now() });
      location.search = "?bill=" + bRef.id;
    }catch(e){ alert("Error: "+e.message); setBusy(false); }
  };

  return (
    <div className="wrap center">
      <div className="eyebrow">Crear</div>
      <h1 className="h1" style={{marginBottom:14}}>Nuevo almuerzo</h1>
      <p className="lead">Pega los ítems, uno por línea, con el precio al final. Los grupales (se reparten entre todos) van con <b>*</b> adelante; si solo algunos lo consumieron, va <b>* Nombre precio | Nombre1, Nombre2</b>. Si me mandas la foto por el chat, te lo dejo listo para pegar.</p>
      <input className="field" placeholder="Nombre (ej: Almuerzo viernes)" value={name} onChange={e=>setName(e.target.value)} />
      <textarea className="field" style={{minHeight:140,resize:"vertical"}} placeholder={"Lomo a lo pobre 9500\n* Tabla para picar 12000\n* Papas fritas 5000 | Berni, Benja"} value={itemsText} onChange={e=>setItemsText(e.target.value)} />

      <div className="eyebrow" style={{margin:"6px 0 8px"}}>Participantes (opcional)</div>
      <div className="addrow">
        <input className="field addfield" placeholder="Nombre del participante" value={personName}
          onChange={e=>setPersonName(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); addPerson(); } }} />
        <button type="button" className="addbtn" onClick={addPerson} aria-label="Agregar participante">+</button>
      </div>
      {people.length>0 && (
        <div className="people-chips">
          {people.map((n,i)=>(
            <span key={i} className="chip" style={{cursor:"default"}}>
              <Dot p={{name:n,color:PCOLORS[i%PCOLORS.length]}} size={18}/> {n}
              <button type="button" className="chip-x" onClick={()=>removePerson(i)} aria-label={"Quitar "+n}>×</button>
            </span>
          ))}
        </div>
      )}
      <p className="subnote">Para los grupales "entre algunos", conviene tener a esas personas en la lista (los nombres deben coincidir).</p>

      <button className="btn" disabled={busy} onClick={create}>{busy?"Creando…":"Crear y generar link"}</button>

      {recents.length>0 && (
        <div className="recents">
          <div className="eyebrow" style={{margin:"6px 0 10px"}}>Tus almuerzos</div>
          {recents.map(r=>(
            <div key={r.id} className="recent">
              <a className="recent-main" href={"?bill="+r.id}>
                <span className="recent-name">{r.name}</span>
                <span className="recent-date">{new Date(r.createdAt).toLocaleDateString("es-CL",{day:"numeric",month:"short"})}</span>
              </a>
              <button className="recent-x" title="Quitar de la lista" onClick={()=>{ removeRecent(r.id); setRecents(getRecents()); }}>×</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- ¿Quién eres? ----------
function Identify({ people, billId, billName, onPick }) {
  const [name, setName] = useState("");
  const [adding, setAdding] = useState(false);
  const add = async () => {
    const n = name.trim(); if(!n) return;
    const ref = await billRef(billId).collection("participants").add({ name:n, color:PCOLORS[people.length%PCOLORS.length], pos:Date.now() });
    onPick(ref.id);
  };
  return (
    <div className="wrap center">
      <div className="eyebrow">{billName}</div>
      <h1 className="h1" style={{marginBottom:18}}>¿Cuál eres tú?</h1>
      <div>
        {people.map(p=>(
          <span key={p.id} className="chip" onClick={()=>onPick(p.id)}><Dot p={p} /> {p.name}</span>
        ))}
      </div>
      {!adding
        ? <button className="btn alt" style={{marginTop:10}} onClick={()=>setAdding(true)}>No estoy en la lista</button>
        : <div style={{marginTop:10}}>
            <input className="field" placeholder="Tu nombre" value={name} autoFocus onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} />
            <button className="btn" onClick={add}>Sumarme</button>
          </div>}
    </div>
  );
}

// ---------- Pantalla principal de la cuenta ----------
function Bill({ token }) {
  const [bill, setBill] = useState(null);
  const [items, setItems] = useState([]);
  const [people, setPeople] = useState([]);
  const [claims, setClaims] = useState([]); // {itemId, participantId} (solo ítems personales)
  const [meId, setMeId] = useState(localStorage.getItem("cuenta_me_"+token) || null);
  const [tab, setTab] = useState("repartir");
  const [copied, setCopied] = useState(null);
  const [shared, setShared] = useState(false);
  const [ready, setReady] = useState(false);

  useEffect(()=>{
    const ref = billRef(token);
    const unsubs = [];
    ref.get().then(snap=>{
      if(!snap.exists){ setBill(false); setReady(true); return; }
      setBill({ id:snap.id, ...snap.data() });
      unsubs.push(ref.collection("items").orderBy("position").onSnapshot(s=> setItems(s.docs.map(d=>({id:d.id,...d.data()})))));
      unsubs.push(ref.collection("participants").orderBy("pos").onSnapshot(s=> setPeople(s.docs.map(d=>({id:d.id,...d.data()})))));
      unsubs.push(ref.collection("claims").onSnapshot(s=> setClaims(s.docs.map(d=>d.data()))));
      setReady(true);
    }).catch(e=>{ console.error(e); setBill(false); setReady(true); });
    return ()=> unsubs.forEach(u=>u());
  }, [token]);

  const peopleById = useMemo(()=>Object.fromEntries(people.map(p=>[p.id,p])),[people]);
  const me = meId ? peopleById[meId] : null;
  const claimsOf = (itemId) => claims.filter(c=>c.itemId===itemId).map(c=>c.participantId);

  // resuelve nombres -> ids de participantes (para grupales entre algunos)
  const idsForNames = (names) => {
    const want = names.map(norm);
    return people.filter(p=> want.includes(norm(p.name))).map(p=>p.id);
  };
  // a quién se reparte un ítem
  const ownersOf = (it) => {
    if(it.grupal){
      const ids = (it.splitNames && it.splitNames.length) ? idsForNames(it.splitNames) : people.map(p=>p.id);
      return ids.length ? ids : people.map(p=>p.id); // si no calzan nombres, entre todos
    }
    return claimsOf(it.id);
  };

  // si el participante guardado ya no existe, re-identificar
  useEffect(()=>{ if(ready && meId && people.length && !peopleById[meId]){ localStorage.removeItem("cuenta_me_"+token); setMeId(null);} },[ready,people]);

  const pickMe = (id) => { localStorage.setItem("cuenta_me_"+token, id); setMeId(id); };
  const clearMe = () => { localStorage.removeItem("cuenta_me_"+token); setMeId(null); };

  const setOwner = async (itemId, pid, on) => {
    const ref = billRef(token).collection("claims").doc(itemId+"_"+pid);
    if(on) await ref.set({ itemId, participantId:pid, createdAt:ts() });
    else await ref.delete();
  };

  // ítem personal: un solo dueño y queda bloqueado.
  // libre -> me lo asigno | mío -> lo suelto | de otra persona -> no hago nada
  const claimSolo = async (itemId) => {
    const owners = claimsOf(itemId);
    if(!owners.length){ await setOwner(itemId, me.id, true); return; }
    if(owners.includes(me.id)){ await setOwner(itemId, me.id, false); return; }
  };

  const totals = useMemo(()=>{
    const per = {}; people.forEach(p=>per[p.id]={items:[],sub:0});
    let unassigned = 0;
    items.forEach(it=>{
      const owners = ownersOf(it);
      if(!owners.length){ unassigned += Number(it.price); return; }
      const share = Number(it.price)/owners.length;
      owners.forEach(oid=>{ if(per[oid]){ per[oid].items.push({name:it.name,share,split:owners.length}); per[oid].sub+=share; }});
    });
    return { per, unassigned };
  },[items,claims,people]);

  const billSub = items.reduce((s,i)=>s+Number(i.price),0);
  const tip = bill ? Number(bill.tipPct ?? 0.10) : 0.10;
  const assignedCount = items.filter(it=> ownersOf(it).length>0).length;
  const progress = items.length ? Math.round(assignedCount/items.length*100) : 0;

  const shareLink = () => {
    const url = location.origin + location.pathname + "?bill=" + token;
    try{ navigator.clipboard.writeText(url); }catch(e){}
    setShared(true); setTimeout(()=>setShared(false),1600);
  };
  const copyCharge = (p) => {
    const tot = totals.per[p.id].sub*(1+tip);
    try{ navigator.clipboard.writeText(`${p.name}, te tocó ${fmt(tot)} de la cuenta (incluye ${Math.round(tip*100)}% de propina). Te paso los datos para la transferencia 🙌`); }catch(e){}
    setCopied(p.id); setTimeout(()=>setCopied(null),1600);
  };

  if(!ready) return <div className="wrap center"><p className="lead">Cargando…</p></div>;
  if(bill===false) return <div className="wrap center"><h1 className="h1">Link no encontrado</h1><p className="lead">Revisa que el link esté completo.</p></div>;
  if(!me) return <Identify people={people} billId={bill.id} billName={bill.name} onPick={pickMe} />;

  return (
    <div>
      <div className="wrap">
        <div className="head">
          <div className="eyebrow">{bill.name} · mesa de {people.length}</div>
          <h1 className="h1">La cuenta</h1>
        </div>

        <div className="topbar">
          <span className="me">
            <Dot p={me} size={20}/> Eres {me.name}
            <button className="switch" onClick={clearMe}>cambiar</button>
          </span>
          <button className="ghost" onClick={shareLink}>{shared?"Link copiado ✓":"Compartir link"}</button>
        </div>

        <div className="tabs">
          <button className={"tab"+(tab==="repartir"?" on":"")} onClick={()=>setTab("repartir")}>Lo mío</button>
          <button className={"tab"+(tab==="resumen"?" on":"")} onClick={()=>setTab("resumen")}>Resumen</button>
        </div>

        {tab==="repartir" && <>
          <div className="hint">Toca lo que consumiste para sumarlo a tu cuenta; queda bloqueado para que nadie te lo borre. Los ítems grupales ya vienen repartidos. Todo en vivo.</div>
          {items.map(it=>{
            // ---- ítem grupal: repartido automáticamente, sin tocar ----
            if(it.grupal){
              const ids = ownersOf(it);
              const label = (it.splitNames && it.splitNames.length) ? it.splitNames.join(", ") : "Entre todos";
              return (
                <div key={it.id} className="itemwrap">
                  <div className="item grupal">
                    <span className="item-name">{it.name}<span className="gbadge">grupal</span></span>
                    <span className="item-right">
                      {ids.length>0 && <span className="owners">{ids.map(oid=>{ const o=peopleById[oid]; return o?<Dot key={oid} p={o} size={18}/>:null; })}</span>}
                      <span className="price">{ids.length ? fmt(it.price/ids.length)+" c/u" : fmt(it.price)}</span>
                    </span>
                  </div>
                  <div className="gsub">{label}{ids.length>1 ? " · "+fmt(it.price)+" en total" : ""}</div>
                </div>
              );
            }
            // ---- ítem personal: tocar para tomar / soltar; bloqueado para el resto ----
            const owners = claimsOf(it.id);
            const mine = owners.includes(me.id);
            const taken = owners.length>0 && !mine;
            return (
              <div key={it.id} className="itemwrap">
                <div className={"item"+(mine?" mine":"")+(taken?" taken":"")} style={mine?{"--mc":me.color}:undefined} onClick={()=>claimSolo(it.id)}>
                  <span className="item-name">{it.name}</span>
                  <span className="item-right">
                    {owners.length>0
                      ? <span className="owners">{owners.map(oid=>{ const o=peopleById[oid]; return o?<Dot key={oid} p={o} size={18}/>:null; })}</span>
                      : <span className="price">{fmt(it.price)}</span>}
                  </span>
                </div>
              </div>
            );
          })}
        </>}

        {tab==="resumen" && <>
          {people.map(p=>{
            const t = totals.per[p.id]; if(!t) return null;
            const tot = t.sub*(1+tip);
            return (
              <div key={p.id} className="prow">
                <div className="phead">
                  <span className="me"><Dot p={p} size={20}/> {p.name}</span>
                  <b>{fmt(tot)}</b>
                </div>
                {t.items.map((x,idx)=>(
                  <div key={idx} className="pitem">
                    <span>{x.name}{x.split>1 && <span className="sp"> · ÷{x.split}</span>}</span>
                    <span>{fmt(x.share)}</span>
                  </div>
                ))}
                {t.sub>0 && <div className="pitem"><span className="sp">+ {Math.round(tip*100)}% propina</span><span>{fmt(t.sub*tip)}</span></div>}
                {t.sub>0 && <button className={"ghost"+(copied===p.id?" done":"")} style={{marginTop:8}} onClick={()=>copyCharge(p)}>{copied===p.id?"Copiado ✓":"Copiar cobro"}</button>}
                <div className="tear" />
              </div>
            );
          })}
          <div className="recon">
            <div className="l"><span>Repartido</span><span>{fmt(billSub-totals.unassigned)}</span></div>
            <div className="l"><span>Sin marcar</span><span>{fmt(totals.unassigned)}</span></div>
            <div className="l k"><span>Boleta</span><span>{fmt(billSub)}</span></div>
          </div>
        </>}
      </div>

      {tab==="repartir" && (
        <div className="footer"><div className="footer-in">
          <div className="prog"><div style={{width:progress+"%"}} /></div>
          <span className="fmeta">{totals.unassigned>0 ? <>Faltan <b>{fmt(totals.unassigned)}</b> por marcar</> : <b style={{color:"var(--green)"}}>¡Todo marcado!</b>}</span>
        </div></div>
      )}
    </div>
  );
}

function App(){
  const token = param("bill");
  return token ? <Bill token={token} /> : <CreateBill />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
